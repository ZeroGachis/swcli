name: Pull Request & Push

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Cache the rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.rustup
            ~/.cargo
          key: rust-toolchain-${{ runner.os }}-${{ hashFiles('.config/mise.toml') }}
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true # cache only mise metadata (the rust toolchain cache is handled above)
      - name: Run static analysis
        run: prek run
      - name: Tests
        run: cargo test
